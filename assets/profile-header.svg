  <text x="84" y="302" fill="#C6D4E1" font-family="Arial, Helvetica, sans-serif" font-size="23">I build systems that sense, think, and act —</text>
  <text x="84" y="336" fill="#C6D4E1" font-family="Arial, Helvetica, sans-serif" font-size="23">from microcontrollers and vision models to useful interfaces.</text>

