<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Jess Michael Padogdog portfolio header</title>
  <desc id="description">A portfolio card for a robotics, edge AI, and embedded systems developer.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0C2940"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientTransform="translate(336 86) rotate(52) scale(178 128)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36E6D4" stop-opacity=".72"/>
      <stop offset="1" stop-color="#36E6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientTransform="translate(922 310) rotate(-54) scale(210 150)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity=".72"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="focus" x1="792" y1="214" x2="1092" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C3248"/>
      <stop offset="1" stop-color="#1D4483"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#background)"/>
  <rect width="1200" height="420" rx="30" fill="url(#cyanGlow)"/>
  <rect width="1200" height="420" rx="30" fill="url(#blueGlow)"/>

  <path d="M74 300C224 195 364 246 512 194C635 151 729 95 1052 68" stroke="#2096B9" stroke-width="3" stroke-linecap="round" opacity=".8"/>
  <path d="M74 320C244 239 369 260 537 227C689 197 826 144 1122 124" stroke="#7BA7E6" stroke-width="1.6" stroke-linecap="round" opacity=".8"/>
  <path d="M74 280C206 185 340 228 469 198" stroke="#2ED6C6" stroke-width="3" stroke-linecap="round" opacity=".8"/>

  <rect x="76" y="54" width="194" height="32" rx="16" fill="#1C6B75" fill-opacity=".62"/>
  <text x="98" y="76" fill="#D7F7FF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">PORTFOLIO README</text>

  <text x="76" y="145" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">Jess Michael</text>
  <text x="76" y="180" fill="#61F4E6" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Robotics Developer • Edge AI Builder • Embedded Systems</text>
  <text x="76" y="220" fill="#D5E3F3" font-family="Arial, Helvetica, sans-serif" font-size="20">Building intelligent systems that connect hardware,</text>
  <text x="76" y="248" fill="#D5E3F3" font-family="Arial, Helvetica, sans-serif" font-size="20">computer vision, and practical software.</text>

  <rect x="810" y="184" width="316" height="110" rx="20" fill="url(#focus)" stroke="#6B9FD2" stroke-opacity=".4"/>
  <text x="834" y="220" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Current Focus</text>
  <text x="834" y="246" fill="#7EECE7" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">ESP32 • Computer Vision • IoT</text>
  <text x="834" y="270" fill="#D5E3F3" font-family="Arial, Helvetica, sans-serif" font-size="14">Robotics • React Dashboards • Local AI</text>
</svg>
